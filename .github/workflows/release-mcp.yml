# Build the sqlike-mcp binary for every target and publish the @sqlike/mcp npm packages.
#
# Trigger: push a tag `mcp-v<version>` (e.g. mcp-v0.1.0), or run manually via the Actions UI.
# The `mcp-v*` namespace is distinct from the server's `v*` deploy tags, so this never collides
# with the Cloud Build deploy.
#
# Building varq-mcp compiles no closed engine — `varq-core` is a dev-dep (tests only) since the
# client-distribution split, so this runs identically in the monorepo and the future public repo.
#
# Requires one secret: NPM_TOKEN — an npm automation token for the @sqlike org.
# Ideally runs from the public `sqlike` repo, where GitHub Actions minutes are unlimited.

name: release-mcp

on:
  push:
    tags:
      - 'mcp-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build/publish (e.g. 0.1.0)'
        required: true
      publish:
        description: 'Publish to npm (otherwise build only)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write # npm provenance (sigstore) attestation

env:
  RUSTFLAGS: '-C strip=symbols'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: linux-x64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - key: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - key: darwin-x64
            os: macos-14
            target: x86_64-apple-darwin
          - key: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
          - key: win32-x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release -p varq-mcp --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          ext=""
          [ "${{ matrix.key }}" = "win32-x64" ] && ext=".exe"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/sqlike-mcp$ext" "dist/sqlike-mcp-${{ matrix.key }}$ext"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.key }}
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    if: ${{ github.event_name == 'push' || inputs.publish }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Collect binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ inputs.version }}"
          else
            v="${GITHUB_REF_NAME#mcp-v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Populate packages
        run: node packages/scripts/prepare-release.mjs mcp "${{ steps.ver.outputs.version }}" dist
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for d in mcp-linux-x64 mcp-linux-arm64 mcp-darwin-x64 mcp-darwin-arm64 mcp-win32-x64; do
            npm publish "./packages/$d" --access public --provenance
          done
          npm publish ./packages/mcp --access public --provenance
